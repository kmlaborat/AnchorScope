name: Release

on:
  push:
    tags:
      # セマンティックバージョニング形式（v1.2.3など）の時だけ実行
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: michaelklishin/rust-build-package-release-action@v2
        id: validate
        with:
          command: validate-version

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Linux (Debian 12 / Fedora 42 両対応のmusl)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            command: release-linux
          # 2. macOS (Apple Silicon / M1,M2,M3)
          - target: aarch64-apple-darwin
            os: macos-latest
            command: release-macos
          # 3. macOS (Intel Mac)
          - target: x86_64-apple-darwin
            os: macos-latest
            command: release-macos
          # 4. Windows (64bit)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            command: release-windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      # Linux muslビルドの場合、zigbuildを使うと互換性が高まるため推奨
      - name: Install zig
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: mlugg/setup-zig@v1

      - run: rustup toolchain install stable --profile minimal
      - run: rustup target add ${{ matrix.target }}

      - uses: michaelklishin/rust-build-package-release-action@v2
        id: build
        with:
          command: ${{ matrix.command }}
          target: ${{ matrix.target }}
          locked: 'true'
          archive: 'true'
          # muslビルド時にzigbuildを有効化（互換性向上のため）
          use-zigbuild: ${{ matrix.target == 'x86_64-unknown-linux-musl' && 'true' || 'false' }}

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          # アクションが生成したアーカイブを一時保存
          path: target/${{ matrix.target }}/release/*.{tar.gz,zip}

  release:
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract Changelog
        uses: michaelklishin/rust-build-package-release-action@v2
        with:
          command: extract-changelog
          version: ${{ needs.validate.outputs.version }}
          
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release_assets
          # 各ジョブから集めたファイルを1つのフォルダに集約
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release_assets/ \;
          ls -R release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 抽出した変更履歴をリリース本文に反映
          body_path: release_notes.md
          files: release_assets/*
          name: Release v${{ needs.validate.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
