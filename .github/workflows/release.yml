name: Release

on:
  push:
    tags:
      # Trigger on semantic versioning tags (e.g., v1.2.3)
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate version from tag
        uses: michaelklishin/rust-build-package-release-action@v2
        id: validate
        with:
          command: validate-version

  build:
    name: Build for ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Linux (Static binary via musl for Debian/Fedora compatibility)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            command: release-linux
          # 2. macOS (Apple Silicon / M1, M2, M3)
          - target: aarch64-apple-darwin
            os: macos-latest
            command: release-macos
          # 3. macOS (Intel Mac)
          - target: x86_64-apple-darwin
            os: macos-latest
            command: release-macos
          # 4. Windows (64-bit)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            command: release-windows

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Install zig for cross-compiling musl targets (highly recommended for stability)
      - name: Install zig
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: mlugg/setup-zig@v1

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      # Main build step: produces optimized release binaries and archives (.tar.gz / .zip)
      - name: Build and Package
        uses: michaelklishin/rust-build-package-release-action@v2
        id: build
        with:
          command: ${{ matrix.command }}
          target: ${{ matrix.target }}
          locked: 'true'
          archive: 'true'
          # Use zigbuild for Linux musl to improve compatibility and avoid linker issues
          use-zigbuild: ${{ matrix.target == 'x86_64-unknown-linux-musl' && 'true' || 'false' }}

      # Temporarily store artifacts to pass them to the release job
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/*.{tar.gz,zip}

  release:
    name: Finalize and Publish Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Extract release notes from CHANGELOG.md based on the current tag
      - name: Extract Changelog
        uses: michaelklishin/rust-build-package-release-action@v2
        with:
          command: extract-changelog
          version: ${{ needs.validate.outputs.version }}
          
      # Fetch all binaries built in the matrix jobs
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Organize files into a single directory for easy uploading
      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release_assets/ \;
          ls -R release_assets/

      # Create the official GitHub Release and attach the binaries
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release_assets/*
          name: Release v${{ needs.validate.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
